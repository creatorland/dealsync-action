name: Fetch Email Content
description: Fetch email content from content fetcher, grouped by user. Uses USER_REPORT_ID as syncStateId.
inputs:
  metadata:
    description: 'JSON array of SxT email metadata rows (must include USER_REPORT_ID)'
    required: true
  content-fetcher-url:
    description: 'Content fetcher base URL'
    required: true
outputs:
  success:
    description: 'Whether fetching succeeded'
  emails:
    description: 'JSON array of EmailContent objects'
  failed_ids:
    description: 'SQL-quoted comma-separated IDs with no content (stage 666)'
runs:
  using: node24
  main: dist/index.js
