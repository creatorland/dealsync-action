name: 'Settlement Worker'

# ─────────────────────────────────────────────────────────────────────────
# PHASE 0 SPIKE — workflow_dispatch + scheduler-service cron triggers
# ─────────────────────────────────────────────────────────────────────────
# Story 0.6 (cron-tick latency probe; FR-P0-6, merged in #23) shipped the
# action.yml shells + Rollup-bundled dist/index.js for guard / worker /
# finalizer, so this workflow IS now dispatchable via `gh workflow run`
# and W3 dispatch.
#
# Story 0.1 Task 7 cleanup (#25, 2026-05-27) added `sxt-biscuit` to the
# worker step + a `GITHUB_ACTIONS && !SXT_BISCUIT` hard-fail in main.js
# — a missing W3 secret now surfaces loudly instead of silently flipping
# the worker to dry-run mode while the finalizer marked rows `settled`.
#
# Local validation still uses `scripts/run-worker-locally.mjs`; the
# source modules under src/ are the canonical implementation that the
# action bundles wrap. Static validation: `mcp__w3__compile-workflow`.
# ─────────────────────────────────────────────────────────────────────────

# Manual dispatch only during Phase 0 spike. Story 0.6 (cron-tick latency
# probe) will add scheduler-service-driven cron triggers.
on:
  workflow_dispatch:
    inputs:
      outbox-id:
        description: 'Optional: dispatch against a specific settlement_outbox row id (spike-mode single-row drain). Leave blank for normal batch claim.'
        required: false
        type: string

jobs:
  settle:
    runs-on: ubuntu-latest
    steps:
      - id: guard
        uses: creatorland/dealsync-action/src/outbox-settlement-guard@main
        with:
          batch-size: 100
          lease-seconds: 60
          worker-id: ${{ github.run_id }}
          outbox-id: ${{ inputs.outbox-id }}
          supabase-url: ${{ secrets.W3_SECRET_SUPABASE_URL }}
          supabase-service-role-key: ${{ secrets.W3_SECRET_SUPABASE_SERVICE_ROLE_KEY }}

      - id: worker
        if: steps.guard.outputs.claimed-count != '0'
        uses: creatorland/dealsync-action/src/outbox-settlement-worker@main
        with:
          claimed-batch: ${{ steps.guard.outputs.claimed-batch }}
          worker-id: ${{ github.run_id }}
          lease-seconds: 60
          supabase-url: ${{ secrets.W3_SECRET_SUPABASE_URL }}
          supabase-service-role-key: ${{ secrets.W3_SECRET_SUPABASE_SERVICE_ROLE_KEY }}
          sxt-auth-url: ${{ secrets.W3_SECRET_SXT_AUTH_URL }}
          sxt-auth-secret: ${{ secrets.W3_SECRET_SXT_AUTH_SECRET }}
          # Without sxt-biscuit the worker dry-runs and the finalizer marks rows
          # `settled` anyway — silent data-loss path. Phase 0 fix: pass the
          # biscuit; main.js also hard-fails when GITHUB_ACTIONS is set but the
          # biscuit input is empty, so a missing W3 secret surfaces loudly.
          sxt-biscuit: ${{ secrets.W3_SECRET_SXT_BISCUIT }}

      - id: finalize
        if: always() && steps.guard.outputs.claimed-count != '0'
        uses: creatorland/dealsync-action/src/outbox-settlement-finalizer@main
        with:
          results: ${{ steps.worker.outputs.results }}
          worker-id: ${{ github.run_id }}
          # Thread batch-size + claimed-count through so the finalizer's
          # `more-work = claimedCount === batchSize` decision is meaningful
          # (without these the finalizer falls back to results.length and
          # more-work is essentially always false).
          batch-size: 100
          claimed-count: ${{ steps.guard.outputs.claimed-count }}
          supabase-url: ${{ secrets.W3_SECRET_SUPABASE_URL }}
          supabase-service-role-key: ${{ secrets.W3_SECRET_SUPABASE_SERVICE_ROLE_KEY }}
